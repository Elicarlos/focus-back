version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://pragma_user:pragma_pass@db:5432/focus_pragma
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=pragma_user
      - POSTGRES_PASSWORD=pragma_pass
      - POSTGRES_DB=focus_pragma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pragma_user -d focus_pragma"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
